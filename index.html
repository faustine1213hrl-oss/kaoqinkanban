<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>出差考勤管控驾驶舱</title>
  <script>
    // 中国网络兜底：默认使用页面内置图表渲染，避免依赖任何外部 CDN。
    window.USE_INLINE_CHARTS = true;
  </script>
  <style>
    :root {
      --blue-900: #0f2f63;
      --blue-800: #16427d;
      --blue-700: #1e5aa8;
      --blue-600: #2672d9;
      --blue-500: #2f80ed;
      --blue-100: #eaf3ff;
      --blue-050: #f4f8ff;
      --line: #d8e4f3;
      --text: #1f2d3d;
      --muted: #6b7a90;
      --ok: #1677d2;
      --warn: #f59e0b;
      --danger: #d93025;
      --danger-bg: #fff1f0;
      --green: #10a36a;
      --card: #ffffff;
      --shadow: 0 8px 24px rgba(22, 66, 125, 0.1);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1280px;
      background: #eef4fb;
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .topbar {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      color: #fff;
      background: linear-gradient(90deg, var(--blue-900), var(--blue-700));
      box-shadow: 0 6px 18px rgba(15, 47, 99, 0.22);
    }

    .brand-title {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.42);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      font-weight: 700;
    }

    .brand-title h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.15;
    }

    .brand-title p {
      margin: 6px 0 0;
      color: rgba(255, 255, 255, 0.74);
      font-size: 13px;
    }

    .topbar-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.86);
    }

    .shell {
      display: grid;
      grid-template-columns: 228px 1fr;
      min-height: calc(100vh - 72px);
      padding-bottom: 54px;
    }

    .sidebar {
      background: #fff;
      border-right: 1px solid var(--line);
      padding: 18px 14px;
    }

    .side-section-title {
      margin: 10px 10px 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .nav-item {
      width: 100%;
      height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 5px 0;
      padding: 0 12px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: #33435c;
      cursor: pointer;
      text-align: left;
    }

    .nav-item:hover {
      background: var(--blue-050);
      color: var(--blue-700);
    }

    .nav-item.active {
      background: var(--blue-100);
      color: var(--blue-800);
      font-weight: 700;
    }

    .main {
      padding: 18px 22px 28px;
      overflow-x: auto;
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(6, minmax(148px, 1fr));
      gap: 12px;
      padding: 14px;
      margin-bottom: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .filter-field {
      min-width: 0;
    }

    .filter-field label {
      display: block;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 12px;
    }

    .filter-field select,
    .filter-field input {
      width: 100%;
      height: 34px;
      border: 1px solid #cad8e8;
      border-radius: 5px;
      padding: 0 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    .filter-field select:focus,
    .filter-field input:focus {
      border-color: var(--blue-500);
      box-shadow: 0 0 0 3px rgba(47, 128, 237, 0.12);
    }

    .filter-actions {
      display: flex;
      align-items: end;
      gap: 8px;
      min-width: 236px;
    }

    .btn {
      height: 34px;
      border: 1px solid var(--blue-600);
      border-radius: 5px;
      padding: 0 14px;
      background: #fff;
      color: var(--blue-700);
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.primary {
      background: var(--blue-600);
      color: #fff;
    }

    .btn.ghost {
      border-color: #cad8e8;
      color: #42526d;
    }

    .page-head {
      display: flex;
      align-items: end;
      justify-content: space-between;
      margin: 8px 0 14px;
    }

    .page-head h2 {
      margin: 0;
      color: #10284f;
      font-size: 22px;
      line-height: 1.25;
    }

    .page-desc {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .page-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab-btn {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 0 16px;
      background: #fff;
      color: #3d4c63;
      cursor: pointer;
    }

    .tab-btn.active {
      border-color: var(--blue-600);
      background: var(--blue-600);
      color: #fff;
      font-weight: 700;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(158px, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .kpi-grid.compact {
      grid-template-columns: repeat(5, minmax(180px, 1fr));
    }

    .kpi-card {
      position: relative;
      min-height: 112px;
      padding: 14px 14px 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .kpi-name {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #3b4b63;
      font-size: 13px;
    }

    .info {
      width: 18px;
      height: 18px;
      display: inline-grid;
      place-items: center;
      border: 1px solid #b7cbe2;
      border-radius: 50%;
      background: var(--blue-050);
      color: var(--blue-700);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      flex: 0 0 auto;
    }

    .formula-tip {
      display: none;
      position: absolute;
      z-index: 5;
      top: 40px;
      right: 12px;
      width: 250px;
      padding: 10px 12px;
      border: 1px solid #bad1ec;
      border-radius: 6px;
      background: #fff;
      color: #31425c;
      font-size: 12px;
      line-height: 1.55;
      box-shadow: 0 10px 24px rgba(15, 47, 99, 0.16);
    }

    .info:hover + .formula-tip,
    .formula-tip:hover {
      display: block;
    }

    .kpi-value {
      margin-top: 12px;
      color: var(--blue-800);
      font-size: 29px;
      font-weight: 800;
      line-height: 1;
    }

    .kpi-value.danger {
      color: var(--danger);
    }

    .kpi-value.warn {
      color: var(--warn);
    }

    .kpi-sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
    }

    .grid-2,
    .grid-3 {
      display: grid;
      gap: 14px;
      margin-bottom: 14px;
    }

    .grid-2 {
      grid-template-columns: minmax(0, 1.3fr) minmax(0, 0.9fr);
    }

    .grid-3 {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .panel {
      min-width: 0;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .panel-title {
      margin: 0;
      color: #152d52;
      font-size: 16px;
      font-weight: 700;
    }

    .panel-note {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .chart {
      width: 100%;
      height: 310px;
    }

    .chart.short {
      height: 250px;
    }

    .chart.tall {
      height: 380px;
    }

    .fallback-chart {
      width: 100%;
      height: 100%;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 12px;
      padding: 8px 4px;
    }

    .fallback-bar-row {
      display: grid;
      grid-template-columns: 116px minmax(0, 1fr);
      align-items: center;
      gap: 10px;
    }

    .fallback-bar-label,
    .fallback-axis-label,
    .fallback-heat-y {
      color: #44556e;
      font-size: 12px;
      line-height: 1.25;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fallback-track {
      position: relative;
      height: 24px;
      border-radius: 5px;
      background: #eef5ff;
      overflow: hidden;
    }

    .fallback-bar {
      height: 100%;
      min-width: 2px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 6px;
      border: 0;
      border-radius: 5px;
      background: var(--blue-500);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .fallback-bar:hover,
    .fallback-column:hover,
    .fallback-heat-cell:hover {
      filter: brightness(0.94);
    }

    .fallback-threshold-line {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 0;
      border-left: 2px dashed var(--warn);
      pointer-events: none;
    }

    .fallback-threshold-label {
      position: absolute;
      top: -18px;
      transform: translateX(-50%);
      color: #b76b00;
      font-size: 12px;
      white-space: nowrap;
    }

    .fallback-column-chart {
      height: 100%;
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(44px, 1fr);
      align-items: end;
      gap: 14px;
      padding: 20px 8px 8px;
      border-bottom: 1px solid #dce8f7;
    }

    .fallback-column-wrap {
      min-width: 0;
      height: 100%;
      display: grid;
      grid-template-rows: 1fr auto;
      gap: 8px;
      align-items: end;
      justify-items: center;
    }

    .fallback-column {
      width: 34px;
      min-height: 4px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 4px;
      border: 0;
      border-radius: 5px 5px 0 0;
      background: var(--blue-500);
      color: #fff;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .fallback-pie-wrap {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(180px, 0.9fr) minmax(160px, 1fr);
      gap: 20px;
      align-items: center;
    }

    .fallback-donut {
      width: min(190px, 90%);
      aspect-ratio: 1;
      justify-self: center;
      position: relative;
      border-radius: 50%;
      box-shadow: inset 0 0 0 1px #e3edf8;
    }

    .fallback-donut::after {
      content: "";
      position: absolute;
      inset: 25%;
      border-radius: 50%;
      background: #fff;
      box-shadow: inset 0 0 0 1px #e3edf8;
    }

    .fallback-legend {
      display: grid;
      gap: 8px;
      align-content: center;
    }

    .fallback-legend-item {
      display: grid;
      grid-template-columns: 12px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      color: #44556e;
      font-size: 12px;
    }

    .fallback-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    .fallback-legend-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .fallback-heatmap {
      height: 100%;
      display: grid;
      gap: 6px;
      align-content: center;
      overflow: auto;
      padding: 4px;
    }

    .fallback-heat-row {
      display: grid;
      grid-template-columns: 92px repeat(var(--cols), minmax(58px, 1fr));
      gap: 6px;
      align-items: center;
    }

    .fallback-heat-cell {
      min-height: 34px;
      display: grid;
      place-items: center;
      border-radius: 5px;
      border: 1px solid rgba(38, 114, 217, 0.12);
      color: #173b70;
      font-size: 12px;
      font-weight: 700;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 7px;
    }

    table {
      width: 100%;
      min-width: 1020px;
      border-collapse: collapse;
      background: #fff;
      font-size: 13px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      height: 40px;
      padding: 0 10px;
      background: #eaf3ff;
      color: #24476f;
      text-align: left;
      font-weight: 700;
      border-bottom: 1px solid var(--line);
      white-space: nowrap;
    }

    tbody td {
      min-height: 42px;
      padding: 10px;
      border-bottom: 1px solid #edf2f8;
      color: #31425c;
      vertical-align: middle;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: #f7fbff;
    }

    tbody tr.abnormal {
      background: var(--danger-bg);
    }

    .link {
      border: 0;
      background: transparent;
      color: var(--blue-700);
      cursor: pointer;
      padding: 0;
      font-weight: 700;
    }

    .link + .link {
      margin-left: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 11px;
      background: var(--blue-100);
      color: var(--blue-800);
      font-size: 12px;
      font-weight: 700;
    }

    .tag.danger {
      background: #ffe5e2;
      color: var(--danger);
    }

    .tag.warn {
      background: #fff4db;
      color: #b76b00;
    }

    .tag.green {
      background: #e7f7ef;
      color: var(--green);
    }

    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      color: var(--muted);
      background: #fbfdff;
      font-size: 12px;
    }

    .pager-controls {
      display: flex;
      gap: 6px;
    }

    .pager-btn {
      height: 24px;
      min-width: 28px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #fff;
      color: #41536b;
    }

    .explain-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .explain-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfdff;
    }

    .explain-card h4 {
      margin: 0 0 7px;
      color: #203d66;
      font-size: 14px;
    }

    .explain-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    .flow-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .flow {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }

    .flow-step {
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border: 1px solid #b9d3f0;
      border-radius: 6px;
      background: var(--blue-050);
      color: #294f80;
      font-size: 12px;
      line-height: 1.25;
    }

    .flow-arrow {
      color: var(--blue-600);
      font-weight: 700;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .summary-item {
      min-height: 74px;
      padding: 11px 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fbfdff;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
    }

    .summary-value {
      margin-top: 7px;
      color: #203d66;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
    }

    .breadcrumb-bar {
      position: fixed;
      z-index: 20;
      left: 0;
      right: 0;
      bottom: 0;
      height: 46px;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 22px;
      background: #fff;
      border-top: 1px solid var(--line);
      box-shadow: 0 -5px 18px rgba(15, 47, 99, 0.08);
      color: #52647d;
      font-size: 13px;
    }

    .breadcrumb-label {
      color: #24476f;
      font-weight: 700;
    }

    .breadcrumb-current {
      color: var(--blue-700);
      font-weight: 700;
    }

    .empty {
      display: grid;
      place-items: center;
      min-height: 180px;
      color: var(--muted);
      border: 1px dashed #cbd9ea;
      border-radius: 7px;
      background: #fbfdff;
    }

    .toast {
      position: fixed;
      z-index: 50;
      right: 24px;
      top: 86px;
      max-width: 420px;
      display: none;
      padding: 12px 14px;
      border-radius: 7px;
      background: #173b70;
      color: #fff;
      box-shadow: 0 10px 28px rgba(15, 47, 99, 0.22);
      font-size: 13px;
      line-height: 1.5;
    }

    .toast.show {
      display: block;
    }

    @media (max-width: 1500px) {
      .filters {
        grid-template-columns: repeat(4, minmax(148px, 1fr));
      }

      .kpi-grid {
        grid-template-columns: repeat(4, minmax(168px, 1fr));
      }

      .grid-2,
      .flow-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand-title">
      <div class="brand-mark">勤</div>
      <div>
        <h1>出差考勤管控驾驶舱</h1>
        <p>领导驾驶舱原型 · 出差达标、异常追溯、单位对比、人员明细下钻</p>
      </div>
    </div>
    <div class="topbar-meta">
      <span>数据周期：2026</span>
      <span>口径：仅统计出差相关数据</span>
      <span id="topStateText">总览</span>
    </div>
  </header>

  <div class="shell">
    <aside class="sidebar">
      <div class="side-section-title">驾驶舱视图</div>
      <button class="nav-item active" data-view="overview" onclick="navigateTo('overview')">总览页</button>
      <button class="nav-item" data-view="unit" onclick="navigateTo('unit')">单位下钻页</button>
      <button class="nav-item" data-view="board" onclick="navigateTo('board')">单位班子情况页</button>
      <button class="nav-item" data-view="employee" onclick="navigateTo('employee')">单位员工情况页</button>
      <button class="nav-item" data-view="person" onclick="navigateTo('person')">个人明细页</button>
      <div class="side-section-title">当前口径</div>
      <div class="explain-card">
        <h4>分类说明</h4>
        <p>营销大区只统计跨区域出差；运营部门、职能部门按正常出差天数计算出差率。</p>
      </div>
    </aside>

    <main class="main">
      <section class="filters" id="filters"></section>
      <section id="content"></section>
    </main>
  </div>

  <footer class="breadcrumb-bar">
    <span class="breadcrumb-label">下钻路径</span>
    <span id="breadcrumbText">总览 → 分类/单位 → 单位详情 → 班子页面/员工页面 → 个人明细 → 每日出差明细</span>
  </footer>

  <div class="toast" id="toast"></div>

  <script>
    // =============================
    // 模拟数据位置：单位、人员、出差明细
    // =============================
    const BOARD_LEVELS = [
      "股份中干副职",
      "浓香公司中层管理人员",
      "浓香公司中层管理人员（试用期）",
      "股份中干副职（试用期）"
    ];

    const EXCEPTION_TYPES = [
      "低于出差下限",
      "未报备跨区域出差",
      "跨区域出差超阈值",
      "单一地市/区县占比超阈值",
      "数据待核验"
    ];

    const unitData = [
      { unit: "重庆大区", category: "营销大区" },
      { unit: "四川大区", category: "营销大区" },
      { unit: "京津大区", category: "营销大区" },
      { unit: "河南大区", category: "营销大区" },
      { unit: "消费者运营部", category: "运营部门" },

    function evaluatePeople() {
      peopleData = peopleData.map(person => {
        const assessDays = Math.max(0, person.workDays - person.leaveDays - person.deductDays);
        const threshold = thresholdConfig.find(item => item.category === person.category);
        const boundary = regionBoundaryConfig.find(item => item.unit === person.unit && item.enabled);
        let businessDays = 0;
        let crossRegionDays = 0;
        const destinationDays = {};
        const abnormalTypes = new Set();
        const enhancedDetails = person.details.map(detail => {
          const countedDays = detail.counted ? Number(detail.days || 0) : 0;
          businessDays += countedDays;
          let isCrossRegion = false;
          let rowAbnormal = false;
          let note = "";
          const pendingData = !detail.province || !detail.city || !threshold;

          if (person.category === "营销大区") {
            if (!boundary || pendingData) {
              abnormalTypes.add("数据待核验");
              rowAbnormal = true;
              note = "区域边界、阈值或目的地信息缺失，需人工核验";
            } else {
              isCrossRegion = !(detail.province === boundary.province && boundary.citiesOrDistricts.includes(detail.city));
              if (isCrossRegion) {
                crossRegionDays += countedDays;
                destinationDays[detail.city] = (destinationDays[detail.city] || 0) + countedDays;
                if (!detail.reported && countedDays > 0) {
                  abnormalTypes.add("未报备跨区域出差");
                  rowAbnormal = true;
                  note = "存在跨区域出差但未匹配到报备记录";
                }
              }
            }

            abnormalTypes.add("数据待核验");
            rowAbnormal = true;
            note = "阈值或目的地信息缺失，需人工核验";
          }

          return {
            ...detail,
            isCrossRegion,
            rowAbnormal,
            abnormalNote: note
          };
        });

        const travelRate = assessDays ? businessDays / assessDays : 0;
        const crossRegionRate = assessDays ? crossRegionDays / assessDays : 0;

        if (person.category === "营销大区" && threshold) {
          const maxCityDays = Math.max(0, ...Object.values(destinationDays));
          const singleCityRate = crossRegionDays ? maxCityDays / crossRegionDays : 0;
          if (crossRegionDays > 0 && (crossRegionRate > threshold.upperRate || crossRegionDays > threshold.upperDays)) {
            abnormalTypes.add("跨区域出差超阈值");
          }
          if (crossRegionDays > 0 && singleCityRate > threshold.singleCityUpperRate) {
            abnormalTypes.add("单一地市/区县占比超阈值");
          }
        }

        if (person.category !== "营销大区" && threshold && travelRate < threshold.lowerRate) {
          abnormalTypes.add("低于出差下限");
        }

        const abnormalTypeList = [...abnormalTypes];
        return {
          ...person,
          assessDays,
          businessDays,
          crossRegionDays,
          travelRate,
          crossRegionRate,
          threshold: threshold ? threshold.label : "未配置",
          thresholdConfig: threshold,
          isAbnormal: abnormalTypeList.length > 0,
          isQualified: abnormalTypeList.length === 0,
          abnormalTypes: abnormalTypeList,
          details: enhancedDetails.map(detail => {
            if (person.category === "营销大区" && detail.isCrossRegion && abnormalTypeList.includes("跨区域出差超阈值") && !detail.abnormalNote) {

            if (person.category !== "营销大区" && abnormalTypeList.includes("低于出差下限") && !detail.abnormalNote) {
              return { ...detail, rowAbnormal: true, abnormalNote: "个人出差率低于阈值下限" };
            }
            if (person.category === "营销大区" && detail.isCrossRegion && abnormalTypeList.includes("单一地市/区县占比超阈值") && !detail.abnormalNote) {

      if (options.scope === "班子") rows = rows.filter(person => person.isLeadership);
      if (options.scope === "员工") rows = rows.filter(person => !person.isLeadership);
      if (filters.personScope === "班子") rows = rows.filter(person => person.isLeadership);
      if (filters.personScope === "员工") rows = rows.filter(person => !person.isLeadership);
      if (filters.level !== "全部") {

        else if (filters.level === "员工") rows = rows.filter(person => !person.isLeadership);

      if (filters.abnormalStatus === "异常") rows = rows.filter(person => person.isAbnormal);
      if (filters.abnormalType !== "全部") rows = rows.filter(person => person.abnormalTypes.includes(filters.abnormalType));

    function aggregate(rows) {
      const total = rows.length;
      const abnormal = rows.filter(person => person.isAbnormal).length;
      const qualified = total - abnormal;
      const businessDays = rows.reduce((sum, person) => sum + person.businessDays, 0);
      const crossRegionDays = rows.reduce((sum, person) => sum + person.crossRegionDays, 0);
      const crossPeople = rows.filter(person => person.crossRegionDays > 0).length;
      const unreportedPeople = rows.filter(person => person.abnormalTypes.includes("未报备跨区域出差")).length;
      const crossOverPeople = rows.filter(person => person.abnormalTypes.includes("跨区域出差超阈值")).length;
      const lowPeople = rows.filter(person => person.abnormalTypes.includes("低于出差下限")).length;
      const avgTravelRate = total ? rows.reduce((sum, person) => sum + person.travelRate, 0) / total : 0;
      const avgCrossRate = total ? rows.reduce((sum, person) => sum + person.crossRegionRate, 0) / total : 0;
      return {
        total,
        abnormal,
        qualified,
        businessDays,
        crossRegionDays,
        crossPeople,
        unreportedPeople,
        crossOverPeople,
        lowPeople,
        qualifiedRate: total ? qualified / total : 0,
        abnormalRate: total ? abnormal / total : 0,
        avgDays: total ? businessDays / total : 0,
        avgCrossDays: total ? crossRegionDays / total : 0,
        crossPeopleRate: total ? crossPeople / total : 0,
        avgTravelRate,
        avgCrossRate
      };
    }

    function groupByCategory(rows) {
      return ["营销大区", "运营部门", "职能部门"].map(category => {
        const categoryRows = rows.filter(person => person.category === category);
        return { name: category, ...aggregate(categoryRows) };
      });
    }

    function groupByUnit(rows, category) {
      return getUnitsByCategory(category).map(unit => {
        const unitRows = rows.filter(person => person.unit === unit);
        return { unit, category: unitCategory(unit), ...aggregate(unitRows) };
      });
    }

    function exceptionDistribution(rows) {
      const counts = {};
      EXCEPTION_TYPES.forEach(type => counts[type] = 0);
      rows.forEach(person => person.abnormalTypes.forEach(type => counts[type] = (counts[type] || 0) + 1));
      return Object.entries(counts).filter(([, value]) => value > 0).map(([name, value]) => ({ name, value }));
    }

    function destinationStats(rows, mode = "business") {
      const map = {};
      rows.forEach(person => {
        person.details.forEach(detail => {
          const include = mode === "cross" ? detail.isCrossRegion && detail.days > 0 : detail.counted && detail.days > 0;
          if (!include) return;
          const key = detail.city || "待核验地市";
          map[key] = (map[key] || 0) + Number(detail.days || 0);
        });
      });
      return Object.entries(map)
        .map(([name, value]) => ({ name, value: Number(value.toFixed(1)) }))
        .sort((a, b) => b.value - a.value);
    }

    function table(htmlRows, minWidth = 1020) {
      return `
        <div class="table-wrap">
          <table style="min-width:${minWidth}px">${htmlRows}</table>
          <div class="pager">
            <span>共 ${Math.max(0, (htmlRows.match(/<tr/g) || []).length - 1)} 条，当前显示第 1 页</span>
            <div class="pager-controls">
              <button class="pager-btn">上一页</button>
              <button class="pager-btn">1</button>
              <button class="pager-btn">下一页</button>
            </div>
          </div>
        </div>
      `;
    }

    function statusTag(person) {
      return person.isAbnormal ? `<span class="tag danger">异常</span>` : `<span class="tag green">正常</span>`;
    }

    function abnormalText(person) {
      return person.abnormalTypes.length ? person.abnormalTypes.join("、") : "无";
    }

    function metricCard(name, value, sub, formulaKey, tone = "") {
      return `
        <div class="kpi-card">
          <div class="kpi-name">
            <span>${name}</span>
            <span class="info" onclick="showToast('${formulaMap[formulaKey]}')">i</span>
            <div class="formula-tip">${formulaMap[formulaKey]}</div>
          </div>
          <div class="kpi-value ${tone}">${value}</div>
          <div class="kpi-sub">${sub}</div>
        </div>
      `;
    }

    function pageHead(title, desc = "", right = "") {
      return `
        <div class="page-head">
          <div>
            <h2>${title}</h2>
            ${desc ? `<p class="page-desc">${desc}</p>` : ""}
          </div>
          <div class="page-tools">${right}</div>
        </div>
      `;
    }

    const inlineChartColors = ["#5575d9", "#8fd175", "#ffd166", "#f26d6d", "#56c2d6", "#6aa7ff", "#f7a45a", "#7a89d8"];

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function chartUnit(option) {
      const formatter = option?.xAxis?.axisLabel?.formatter || option?.yAxis?.axisLabel?.formatter || "";
      return String(formatter).includes("%") ? "%" : "";
    }

    function normalizeSeriesValue(item) {
      if (Array.isArray(item)) return Number(item[item.length - 1] || 0);
      if (typeof item === "object" && item !== null) return Number(item.value || 0);
      return Number(item || 0);
    }

    function renderInlineChart(id, option, clickHandler) {
      const node = document.getElementById(id);
      if (!node) return;
      const series = option.series && option.series[0] ? option.series[0] : {};
      if (series.type === "pie") renderInlinePie(node, series.data || []);
      else if (series.type === "heatmap") renderInlineHeatmap(node, option, series);
      else if (series.type === "bar") renderInlineBar(node, option, series, clickHandler);
      else node.innerHTML = "<div class='empty'>暂无图表数据</div>";
      chartPool.push({ dispose() {}, resize() {} });
    }

    function renderInlineBar(node, option, series, clickHandler) {
      const horizontal = option?.yAxis?.type === "category";
      const names = horizontal ? (option.yAxis.data || []) : (option.xAxis.data || []);
      const values = (series.data || []).map(normalizeSeriesValue);
      const threshold = series.markLine?.data?.[0]?.xAxis;
      const unit = chartUnit(option);
      const maxValue = Math.max(1, threshold || 0, ...values, unit === "%" ? 100 : 0);
      const color = typeof series.itemStyle?.color === "string" ? series.itemStyle.color : "#2f80ed";

      if (!names.length) {
        node.innerHTML = "<div class='empty'>暂无图表数据</div>";
        return;
      }

      if (horizontal) {
        node.innerHTML = `
          <div class="fallback-chart">
            ${names.map((name, index) => {
              const value = values[index] || 0;
              const width = Math.max(1, Math.min(100, value / maxValue * 100));
              const thresholdLeft = threshold === undefined ? "" : `
                <span class="fallback-threshold-line" style="left:${Math.min(100, threshold / maxValue * 100)}%"></span>
                ${index === 0 ? `<span class="fallback-threshold-label" style="left:${Math.min(100, threshold / maxValue * 100)}%">阈值 ${threshold}${unit}</span>` : ""}
              `;
              return `
                <div class="fallback-bar-row">
                  <div class="fallback-bar-label" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
                  <div class="fallback-track">
                    <button class="fallback-bar" data-index="${index}" style="width:${width}%;background:${color};">${escapeHtml(value)}${unit}</button>
                    ${thresholdLeft}
                  </div>
                </div>
              `;
            }).join("")}
          </div>
        `;
      } else {
        node.innerHTML = `
          <div class="fallback-column-chart">
            ${names.map((name, index) => {
              const value = values[index] || 0;
              const height = Math.max(4, Math.min(100, value / maxValue * 100));
              return `
                <div class="fallback-column-wrap">
                  <button class="fallback-column" data-index="${index}" style="height:${height}%;background:${color};">${escapeHtml(value)}</button>
                  <div class="fallback-axis-label" title="${escapeHtml(name)}">${escapeHtml(name)}</div>
                </div>
              `;
            }).join("")}
          </div>
        `;
      }

      if (clickHandler) {
        node.querySelectorAll("[data-index]").forEach(button => {
          button.addEventListener("click", () => {
            const index = Number(button.dataset.index);
            clickHandler({ name: names[index], value: values[index], dataIndex: index });
          });
        });
      }
    }

    function renderInlinePie(node, rawData) {
      const data = rawData.length ? rawData : [{ name: "暂无异常", value: 1 }];
      const total = data.reduce((sum, item) => sum + Number(item.value || 0), 0) || 1;
      let cursor = 0;
      const gradient = data.map((item, index) => {
        const value = Number(item.value || 0);
        const start = cursor / total * 360;
        cursor += value;
        const end = cursor / total * 360;
        const color = item.itemStyle?.color || inlineChartColors[index % inlineChartColors.length];
        return `${color} ${start}deg ${end}deg`;
      }).join(", ");

      node.innerHTML = `
        <div class="fallback-chart">
          <div class="fallback-pie-wrap">
            <div class="fallback-donut" style="background:conic-gradient(${gradient});"></div>
            <div class="fallback-legend">
              ${data.map((item, index) => {
                const color = item.itemStyle?.color || inlineChartColors[index % inlineChartColors.length];
                const value = Number(item.value || 0);
                return `
                  <div class="fallback-legend-item">
                    <span class="fallback-dot" style="background:${color};"></span>
                    <span class="fallback-legend-name" title="${escapeHtml(item.name)}">${escapeHtml(item.name)}</span>
                    <strong>${value} · ${((value / total) * 100).toFixed(1)}%</strong>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        </div>
      `;
    }

    function renderInlineHeatmap(node, option, series) {
      const xData = option.xAxis?.data || [];
      const yData = option.yAxis?.data || [];
      const data = series.data || [];
      const max = Math.max(1, ...data.map(item => Number(item[2] || 0)));
      const isDangerScale = JSON.stringify(option.visualMap?.inRange?.color || []).includes("d93025");
      const cellMap = new Map(data.map(item => [`${item[0]}-${item[1]}`, Number(item[2] || 0)]));

      if (!xData.length || !yData.length) {
        node.innerHTML = "<div class='empty'>暂无图表数据</div>";
        return;
      }

      node.innerHTML = `
        <div class="fallback-heatmap" style="--cols:${xData.length}">
          <div class="fallback-heat-row">
            <div></div>
            ${xData.map(name => `<div class="fallback-axis-label" title="${escapeHtml(name)}">${escapeHtml(name)}</div>`).join("")}
          </div>
          ${yData.map((rowName, y) => `
            <div class="fallback-heat-row">
              <div class="fallback-heat-y" title="${escapeHtml(rowName)}">${escapeHtml(rowName)}</div>
              ${xData.map((_, x) => {
                const value = cellMap.get(`${x}-${y}`) || 0;
                const alpha = 0.12 + (value / max) * 0.72;
                const bg = isDangerScale ? `rgba(217, 48, 37, ${alpha})` : `rgba(47, 128, 237, ${alpha})`;
                return `<div class="fallback-heat-cell" style="background:${bg};">${escapeHtml(value)}</div>`;
              }).join("")}
            </div>
          `).join("")}
        </div>
      `;
    }

    function initChart(id, option, clickHandler) {
      const node = document.getElementById(id);
      if (!node) return;
      if (window.echarts && !window.USE_INLINE_CHARTS) {
        const chart = echarts.init(node);
        chart.setOption(option);
        if (clickHandler) chart.on("click", clickHandler);
        chartPool.push(chart);
        return;
      }
      renderInlineChart(id, option, clickHandler);
    }

    function disposeCharts() {
      chartPool.forEach(chart => chart.dispose());
      chartPool = [];
    }

    function barOption(names, values, threshold, unitLabel = "%") {
      return {
        grid: { left: 110, right: 38, top: 28, bottom: 32 },
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        xAxis: {
          type: "value",
          max: value => Math.max(100, Math.ceil(value.max / 10) * 10),
          axisLabel: { formatter: `{value}${unitLabel}` },
          splitLine: { lineStyle: { color: "#e7eef8" } }
        },
        yAxis: {
          type: "category",
          data: names,
          axisLine: { show: false },
          axisTick: { show: false }
        },
        series: [{
          type: "bar",
          barWidth: 16,
          data: values,
          itemStyle: { color: "#2f80ed", borderRadius: [0, 5, 5, 0] },
          label: { show: true, position: "right", formatter: `{c}${unitLabel}` },
          markLine: threshold === undefined ? undefined : {
            symbol: "none",
            label: { formatter: `阈值 ${threshold}${unitLabel}`, color: "#b76b00" },
            lineStyle: { color: "#f59e0b", type: "dashed", width: 2 },
            data: [{ xAxis: threshold }]
          }
        }]
      };
    }

    function pieOption(data) {
      return {
        tooltip: { trigger: "item", formatter: "{b}<br/>人数：{c}<br/>占比：{d}%" },
        legend: { bottom: 0, type: "scroll" },
        series: [{
          type: "pie",
          radius: ["48%", "70%"],
          center: ["50%", "43%"],
          avoidLabelOverlap: true,
          data: data.length ? data : [{ name: "暂无异常", value: 1, itemStyle: { color: "#d9e6f5" } }],
          label: { formatter: "{b}\n{d}%" }
        }]
      };
    }

    function topOption(data, color = "#2f80ed") {
      const list = data.slice(0, 10).reverse();
      return {
        grid: { left: 96, right: 35, top: 20, bottom: 28 },
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        xAxis: { type: "value", splitLine: { lineStyle: { color: "#e7eef8" } } },
        yAxis: { type: "category", data: list.map(item => item.name), axisLine: { show: false }, axisTick: { show: false } },
        series: [{ type: "bar", barWidth: 15, data: list.map(item => item.value), itemStyle: { color, borderRadius: [0, 5, 5, 0] }, label: { show: true, position: "right" } }]
      };
    }

    function heatOption(rows) {
      const cities = unique(destinationStats(rows, "business").slice(0, 8).map(item => item.name));
      const categories = unique(rows.map(person => person.category));
      const data = [];
      categories.forEach((category, y) => {
        cities.forEach((city, x) => {
          const value = rows.filter(person => person.category === category).reduce((sum, person) => {
            return sum + person.details.filter(detail => detail.city === city && detail.counted).reduce((s, detail) => s + detail.days, 0);
          }, 0);
          data.push([x, y, value]);
        });
      });
      return {
        grid: { left: 78, right: 36, top: 35, bottom: 48 },
        tooltip: { position: "top", formatter: params => `${categories[params.value[1]]} - ${cities[params.value[0]]}<br/>出差天数：${params.value[2]}` },
        xAxis: { type: "category", data: cities, axisLabel: { interval: 0, rotate: 28 } },
        yAxis: { type: "category", data: categories },
        visualMap: { min: 0, max: Math.max(4, ...data.map(item => item[2])), calculable: true, orient: "horizontal", left: "center", bottom: 0, inRange: { color: ["#eaf3ff", "#2f80ed", "#0f2f63"] } },
        series: [{ type: "heatmap", data, label: { show: true }, emphasis: { itemStyle: { borderColor: "#333", borderWidth: 1 } } }]
      };
    }

    // =============================
    // 下钻交互位置：导航、图表点击、表格点击统一走这些函数

    function navigateTo(view, context = {}) {
      appState.previousView = appState.view;
      appState.view = view;
      if (context.category) appState.drillTab = context.category;
      if (context.unit !== undefined) appState.selectedUnit = context.unit;
      if (context.personId) appState.selectedPersonId = context.personId;
      if (view === "board" || view === "employee") {
        if (context.unit) {
          appState.filters.unit = context.unit;
          appState.filters.category = unitCategory(context.unit) || appState.filters.category;
        }
      }
      if (view === "person" && !appState.selectedPersonId) {
        const first = filteredPeople()[0] || peopleData[0];
        appState.selectedPersonId = first.id;
      }
      renderFilters();
      render();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goUnitDrill(category) {
      navigateTo("unit", { category });
    }

    function goUnitPeople(unit, scope) {
      navigateTo(scope === "班子" ? "board" : "employee", { unit });
    }

    function goPerson(personId) {
      navigateTo("person", { personId });
    }

    function backToPrevious() {
      navigateTo(appState.previousView || "overview");
    }

      document.querySelectorAll(".nav-item").forEach(item => {
        item.classList.toggle("active", item.dataset.view === appState.view);

      const pathParts = ["总览"];
      if (appState.view === "unit") pathParts.push(appState.drillTab || "分类/单位");
      if (appState.selectedUnit) pathParts.push(appState.selectedUnit);
      if (appState.view === "board") pathParts.push("班子页面");
      if (appState.view === "employee") pathParts.push("员工页面");
      if (appState.view === "person") {
        const person = peopleData.find(item => item.id === appState.selectedPersonId);
        pathParts.push("个人明细");
        if (person) pathParts.push(person.name);
        pathParts.push("每日出差明细");
      }
      document.getElementById("breadcrumbText").innerHTML = pathParts.map((item, index) => index === pathParts.length - 1 ? `<span class="breadcrumb-current">${item}</span>` : item).join(" → ");
      document.getElementById("topStateText").textContent = pathParts.join(" / ");

    function matrixOption(units, rows) {
      const months = ["1月", "2月", "3月", "4月", "5月", "6月"];
      const data = [];
      units.forEach((unit, y) => {
        months.forEach((month, x) => {
          const base = rows.filter(person => person.unit === unit && person.isAbnormal).length;
          const value = month === "5月" ? base : Math.max(0, base - ((x + y) % 2));
          data.push([x, y, value]);
        });
      });
      return {
        grid: { left: 100, right: 30, top: 36, bottom: 44 },
        tooltip: { formatter: params => `${units[params.value[1]]} ${months[params.value[0]]}<br/>异常人数：${params.value[2]}` },
        xAxis: { type: "category", data: months },
        yAxis: { type: "category", data: units },
        visualMap: { min: 0, max: Math.max(3, ...data.map(item => item[2])), calculable: true, left: "center", bottom: 0, orient: "horizontal", inRange: { color: ["#eaf3ff", "#ffd7d2", "#d93025"] } },
        series: [{ type: "heatmap", data, label: { show: true } }]
      };
    }

    function distributionOption(rows) {
      const bins = [
        { name: "0-5%", min: 0, max: 0.05, value: 0 },
        { name: "5-10%", min: 0.05, max: 0.1, value: 0 },
        { name: "10-20%", min: 0.1, max: 0.2, value: 0 },
        { name: "20%以上", min: 0.2, max: Infinity, value: 0 }
      ];
      rows.forEach(person => {
        const rate = person.category === "营销大区" ? person.crossRegionRate : person.travelRate;
        const bin = bins.find(item => rate >= item.min && rate < item.max) || bins[bins.length - 1];
        bin.value += 1;
      });
      return {
        grid: { left: 46, right: 24, top: 28, bottom: 36 },
        tooltip: { trigger: "axis", axisPointer: { type: "shadow" } },
        xAxis: { type: "category", data: bins.map(item => item.name) },
        yAxis: { type: "value", minInterval: 1, splitLine: { lineStyle: { color: "#e7eef8" } } },
        series: [{ type: "bar", barWidth: 30, data: bins.map(item => item.value), itemStyle: { color: "#2f80ed", borderRadius: [5, 5, 0, 0] }, label: { show: true, position: "top" } }]
      };
    }

            </div>
            <div>
              <h4 class="panel-title">营销大区异常判断流程</h4>
              ${makeFlow(flowB)}
            </div>
          </div>
        </div>
      `;
    }

    function renderExplainPanel() {
      return `
        <div class="panel">
          <div class="panel-head"><h3 class="panel-title">指标解释区</h3><span class="panel-note">集中说明核心指标口径</span></div>
          <div class="explain-grid">
            <div class="explain-card"><h4>总体达标率</h4><p>达标人数 / 综合人数 × 100%。达标人数为当前筛选条件下未命中异常规则的人数。</p></div>
            <div class="explain-card"><h4>总体异常率</h4><p>异常人数 / 综合人数 × 100%。异常人数为存在任一异常类型的人数。</p></div>
            <div class="explain-card"><h4>人均出差天数</h4><p>出差总天数 / 综合人数，用于替代总出差人天进行单位间对比。</p></div>
            <div class="explain-card"><h4>营销大区跨区域出差率</h4><p>跨区域出差天数 / 应考核天数。目的地不属于所属大区区域边界的，计为跨区域出差。</p></div>
            <div class="explain-card"><h4>运营/职能部门达标率</h4><p>个人出差率不低于阈值下限则达标；个人出差率 = 出差天数 / 应考核天数。</p></div>
            <div class="explain-card"><h4>异常类型</h4><p>包括低于出差下限、未报备跨区域出差、跨区域出差超阈值、单一地市/区县占比超阈值、数据待核验。</p></div>
          </div>
        </div>
      `;
    }

    function render() {
      disposeCharts();
      updateNavAndPath();
      if (appState.view === "overview") renderOverview();
      if (appState.view === "unit") renderUnitDrill();
      if (appState.view === "board") renderBoardOrEmployee("班子");
      if (appState.view === "employee") renderBoardOrEmployee("员工");
      if (appState.view === "person") renderPersonDetail();
    }

    window.addEventListener("resize", () => chartPool.forEach(chart => chart.resize()));
    renderFilters();
    render();
  </script>
</body>
</html>
